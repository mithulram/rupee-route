# Render Blueprint — RupeeRoute sandbox backend (API + embedded worker + Postgres + Redis)
# Free plan: BullMQ worker runs inside the API container when SANDBOX_COMBINED_WORKER=true.
# Do NOT set LIVE_TRANSFERS_ENABLED=true.

databases:
  - name: rupeeroute-postgres
    plan: free
    region: oregon
    databaseName: rupeeroute
    user: rupeeroute

services:
  - type: redis
    name: rupeeroute-redis
    plan: free
    region: oregon
    maxmemoryPolicy: allkeys-lru
    # Required while Frankfurt API uses external REDIS_URL (cross-region). Auth is via connection-string password.
    ipAllowList:
      - source: 0.0.0.0/0
        description: sandbox-external-api

  - type: web
    name: rupeeroute-api
    runtime: docker
    plan: free
    # Region omitted — existing service is Frankfurt; Render does not support in-place region changes.
    dockerfilePath: ./infra/docker/Dockerfile.api
    dockerContext: .
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - key: LIVE_TRANSFERS_ENABLED
        value: 'false'
      - key: SANDBOX_FORCE_KYC_APPROVED
        value: 'true'
      - key: SANDBOX_COMBINED_WORKER
        value: 'true'
      - key: WORKER_PORT
        value: '3002'
      # DATABASE_URL and REDIS_URL are NOT declared here — the live Frankfurt API uses
      # manually set external connection strings (Oregon Postgres/Redis). Omitting them
      # prevents Blueprint sync from overwriting working cross-region values. See docs/DEPLOYMENT.md.
      - key: JWT_SECRET
        generateValue: true
      - key: WEBHOOK_SIGNING_SECRET
        generateValue: true
      - key: WEB_CORS_ORIGINS
        value: https://rupee-route-web.vercel.app
